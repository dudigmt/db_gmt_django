{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — GMT System</title>
    <link rel="stylesheet" href="{% static 'core/css/output.css' %}">
    <link rel="icon" type="image/png" href="{% static 'core/img/gmtround.png' %}">
    <style>
        /* Warna lo: 
           Cobalt Blue: #0047AB
           Burnt Orange: #CC5500
           Forest Green: #228B22
           VR46 Yellow: #FFD100
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0F1F;  /* deep dark base */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Main background with brand colors as accents */
        .bg-pattern {
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 71, 171, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(204, 85, 0, 0.12) 0%, transparent 35%),
                radial-gradient(circle at 40% 80%, rgba(34, 139, 34, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 70% 20%, rgba(255, 209, 0, 0.08) 0%, transparent 35%);
            pointer-events: none;
        }

        /* Moving grid lines */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 71, 171, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 71, 171, 0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.4;
            animation: gridMove 25s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 60px); }
        }

        /* Floating orbs with brand colors */
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            opacity: 0.5;
        }

        .orb-1 {
            background: #0047AB;
            top: -150px;
            left: -150px;
        }

        .orb-2 {
            background: #CC5500;
            bottom: -150px;
            right: -150px;
        }

        .orb-3 {
            background: #228B22;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            opacity: 0.2;
        }

        /* Main card */
        .login-card {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 400px;
            background: rgba(10, 15, 31, 0.85);
            backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(0, 71, 171, 0.3);
            border-radius: 32px;
            padding: 32px 28px;
            box-shadow: 
                0 30px 60px -15px rgba(0, 71, 171, 0.4),
                0 0 0 1px rgba(204, 85, 0, 0.2) inset,
                0 0 30px -5px rgba(255, 209, 0, 0.2);
            transition: all 0.4s ease;
        }

        .login-card:hover {
            border-color: rgba(204, 85, 0, 0.4);
            box-shadow: 
                0 35px 70px -15px rgba(0, 71, 171, 0.6),
                0 0 0 1px #CC5500 inset,
                0 0 40px -5px #FFD100;
        }

        /* Brand section */
        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 28px;
        }

        .logo-container {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #0047AB, #0A1F3F);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            padding: 15px;
            box-shadow: 
                0 15px 25px -8px rgba(0, 71, 171, 0.5),
                0 0 0 2px rgba(204, 85, 0, 0.3);
            transition: all 0.3s ease;
        }

        .logo-container:hover {
            transform: scale(1.05);
            box-shadow: 
                0 20px 30px -8px #CC5500,
                0 0 0 3px #FFD100;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            margin: auto;
            display: block;
        }

        .brand h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #CCCCCC);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(0, 71, 171, 0.5);
        }

        .brand p {
            color: #94A3B8;
            font-size: 15px;
            letter-spacing: 0.3px;
        }

        /* Form labels */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: #E2E8F0;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            border-left: 3px solid #CC5500;
            padding-left: 10px;
        }

        /* Input fields */
        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #0047AB;
            transition: all 0.3s ease;
        }

        .input-wrapper input {
            width: 100%;
            height: 46px;
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid rgba(0, 71, 171, 0.5);
            border-radius: 16px;
            padding: 0 16px 0 48px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #CC5500;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 
                0 0 0 3px rgba(204, 85, 0, 0.2),
                0 0 20px -5px #FFD100;
        }

        .input-wrapper input:focus + .input-icon {
            color: #FFD100;
        }

        .input-wrapper input::placeholder {
            color: #475569;
            font-size: 14px;
        }

        /* Options row */
        .options-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #94A3B8;
            font-size: 14px;
            cursor: pointer;
        }

        .checkbox input {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            border: 2px solid #0047AB;
            background: transparent;
            cursor: pointer;
            accent-color: #CC5500;
        }

        .forgot-link {
            color: #94A3B8;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.3s ease;
            border-bottom: 1px dashed #CC5500;
            padding-bottom: 2px;
        }

        .forgot-link:hover {
            color: #FFD100;
            border-bottom-color: #FFD100;
        }

        /* Login button */
        .login-btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(145deg, #0047AB, #0A1F3F);
            border: 2px solid #CC5500;
            border-radius: 20px;
            color: white;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            box-shadow: 0 8px 0 #0A2A4A;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 209, 0, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            background: linear-gradient(145deg, #0A2A4A, #0047AB);
            border-color: #FFD100;
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #0A2A4A, 0 0 30px #CC5500;
        }

        .login-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #0A2A4A;
        }

        /* Error message */
        .error-message {
            background: rgba(204, 85, 0, 0.15);
            border: 2px solid #CC5500;
            border-radius: 16px;
            padding: 14px 18px;
            margin-top: 24px;
            color: #FFB084;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
        }

        .error-message svg {
            width: 22px;
            height: 22px;
            color: #FFD100;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            text-align: center;
            color: #475569;
            font-size: 13px;
            border-top: 1px solid rgba(0, 71, 171, 0.4);
            padding-top: 24px;
            letter-spacing: 0.3px;
        }

        .footer span {
            color: #94A3B8;
        }

        .footer span:hover {
            color: #FFD100;
        }
    </style>
</head>
<body>
    <!-- Background layers -->
    <div class="bg-pattern"></div>
    <div class="grid-overlay"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Login card -->
    <div class="login-card">
        <!-- Brand with logo -->
        <div class="brand">
            <div class="logo-container">
                <img src="{% static 'core/img/gmt-logo.png' %}" alt="GMT Logo">
            </div>
            <h1>GMT System</h1>
            <p>Enterprise Management Platform</p>
        </div>

        <!-- Form -->
        <form method="post">
            {% csrf_token %}
            
            <!-- Username field -->
            <div class="form-group">
                <label>USERNAME</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    <input type="text" name="username" placeholder="Enter your username">
                </div>
            </div>

            <!-- Password field -->
            <div class="form-group">
                <label>PASSWORD</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                    <input type="password" name="password" placeholder="••••••••">
                </div>
            </div>

            <!-- Options -->
            <div class="options-row">
                <label class="checkbox">
                    <input type="checkbox" checked>
                    <span>Remember me</span>
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <!-- Login button -->
            <button type="submit" class="login-btn">
                Access Dashboard
            </button>

            <!-- Error handling -->
            {% if form.errors %}
            <div class="error-message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <circle cx="12" cy="16" r="0.5" fill="currentColor"/>
                </svg>
                <span>Invalid username or password</span>
            </div>
            {% endif %}
        </form>

        <!-- Footer -->
        <div class="footer">
            <span>© 2026 GMT System. All rights reserved.</span>
        </div>
    </div>
</body>
</html>
