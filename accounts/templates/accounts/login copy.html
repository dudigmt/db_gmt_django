{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Company System</title>
    <link rel="stylesheet" href="{% static 'core/css/output.css' %}">
    <link rel="icon" type="image/png" href="{% static 'core/img/gmtround.png' %}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b1120;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background grid */
        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(45, 55, 72, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(45, 55, 72, 0.3) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Glowing orbs */
        .orb {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
        }

        .orb-1 {
            background: rgba(59, 130, 246, 0.3);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            background: rgba(139, 92, 246, 0.3);
            bottom: -100px;
            right: -100px;
        }

        /* Main card */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            background: rgba(17, 25, 40, 0.75);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-4px);
        }

        /* Logo/brand */
        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 
                0 10px 20px -5px rgba(59, 130, 246, 0.3),
                inset 0 -2px 0 rgba(0, 0, 0, 0.1);
        }

        .brand-icon svg {
            width: 36px;
            height: 36px;
            color: white;
        }

        .brand h1 {
            font-size: 28px;
            font-weight: 600;
            color: white;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .brand p {
            color: #94a3b8;
            font-size: 15px;
        }

        /* Form elements */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #64748b;
            transition: color 0.2s ease;
        }

        .input-wrapper input {
            width: 100%;
            height: 52px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 0 16px 0 48px;
            color: white;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .input-wrapper input:focus + svg {
            color: #3b82f6;
        }

        .input-wrapper input::placeholder {
            color: #475569;
            font-size: 14px;
        }

        /* Options row */
        .options-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            font-size: 14px;
            cursor: pointer;
        }

        .checkbox input {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 1px solid #334155;
            background: transparent;
            cursor: pointer;
        }

        .forgot-link {
            color: #94a3b8;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .forgot-link:hover {
            color: #3b82f6;
        }

        /* Login button */
        .login-btn {
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -10px rgba(59, 130, 246, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Error message */
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 24px;
            color: #fca5a5;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            text-align: center;
            color: #475569;
            font-size: 13px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 24px;
        }
    </style>
</head>
<body>
    <!-- Background effects -->
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Login card -->
    <div class="login-card">
        <!-- Brand -->
        <div class="brand">
            <div class="brand-icon">
                <img src="{% static 'core/img/gmt-logo.png' %}" alt="GMT Logo" class="w-12 h-12 object-contain">
            </div>
            <h1>Company System</h1>
            <p>Masuk ke dashboard perusahaan</p>
        </div>

        <!-- Form -->
        <form method="post">
            {% csrf_token %}
            
            <!-- Username -->
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                    </svg>
                    <input type="text" name="username" placeholder="admin" autocomplete="off">
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                    </svg>
                    <input type="password" name="password" placeholder="••••••••">
                </div>
            </div>

            <!-- Options -->
            <div class="options-row">
                <label class="checkbox">
                    <input type="checkbox" checked>
                    <span>Ingat saya</span>
                </label>
                <a href="#" class="forgot-link">Lupa password?</a>
            </div>

            <!-- Login button -->
            <button type="submit" class="login-btn">
                Masuk ke Dashboard
            </button>

            <!-- Error message (if any) -->
            {% if form.errors %}
            <div class="error-message">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <circle cx="12" cy="16" r="0.5" fill="currentColor" />
                </svg>
                <span>Username atau password salah</span>
            </div>
            {% endif %}
        </form>

        <!-- Footer -->
        <div class="footer">
            <span>© 2026 Company System. All rights reserved.</span>
        </div>
    </div>
</body>
</html>
